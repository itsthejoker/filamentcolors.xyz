{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  {% include 'partials/head.partial' %}
  <title>{{ title }} | FilamentColors</title>
</head>
<body>
<main-container style="opacity: 0">
  <div class="container text-center mt-5">
    <centered-column class="col-10 col-md-8 col-lg-6">
      <a href="{% url 'homepage' %}">
        <img
          src="{% static 'filamentcolors_square_logo_no_background_cropped.png' %}"
          alt="FilamentColors Logo"
          width="106px"
          height="96px"
        >
      </a>
      <h1 class="site-title">FilamentColors.xyz</h1>
      <p class="site-description">Find the best colors for your 3D printing projects!</p>
      <div class="d-grid my-5 gap-2">
        {% for link in links %}
          <a href="{{ link.url }}" class="btn btn-lg btn-{{ link.variant }}" target="_blank" rel="noopener">
            {{ link.name }}
          </a>
        {% empty %}
          <p>No links added yet. Check back soon!</p>
        {% endfor %}
      </div>
      <div class="footer-logo">
        <a href="{% url 'homepage' %}">
          <img src="{% static 'favicons/favicon-32x32.png' %}" alt="FilamentColors Logo">
          <p class="text-muted small mt-2">filamentcolors.xyz</p>
        </a>
      </div>
    </centered-column>
  </div>
</main-container>
</body>
</html>
